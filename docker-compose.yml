services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: sourcingagent
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sourcingagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Optional: pgAdmin web UI — comment out if not needed
  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
