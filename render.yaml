services:
  - type: web
    name: sourcing-agent-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: SERPER_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: sourcing-agent-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"

databases:
  - name: sourcing-agent-db
    databaseName: sourcingagent
    user: sourcingagent
    plan: free
